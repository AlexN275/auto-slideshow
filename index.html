<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title> ASC Ponca </title>
  <meta name="keywords" content="automatic slideshow, responsive, image gallery" />
  <meta name="description" content="responsive image slideshow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="auto-slideshow.css">
</head>

  
<body>
    <header>
      <h1>Enhanced Slideshow</h1>
      <p> This is a responsive gallery. Automatic and Manual control.</p>
    </header>

  <!-- the responsive gallery separated into columns -->
  <main>
    <div class="column">
      <img id="1" class="slide" src="images/IMG_4058.gif" />
    </div>
  </main>

  
    <!-- modal for the responsive slideshow -->
    <div id="slide-modal">
      <div id="wrap">
        <a id="close" class="controls">&times;</a>
        <a id="expand" class="controls">&#10021;</a>
        <a id="previous" class="controls">&#8672;</a>
        <a id="next" class="controls">&#8674;</a>
        <a id="stop" class="controls">|&nbsp;|</a>
        <a id="automatic" class="controls">&#9658;</a>
      </div>
      <img id="modal-content" src="images/IMG_4070.jpeg alt="image in a slideshow" />
    </div>

  <footer>
    <h2>Alex Nith</h2>
    <ul>
      <li><a href="https://github.com/alexn275" target="_blank">Github</a></li>
    </ul>
  </footer>

<script src="auto-slideshow.js"></script>

</body>

</html>
